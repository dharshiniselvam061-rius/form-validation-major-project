<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validation Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Registration Form</h2>

    <form id="myForm" onsubmit="return validateForm()">

        <!-- Full Name -->
        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" id="name" class="form-control" onchange="validateName()">
            <small class="text-danger" id="nameError"></small>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label>Email</label>
            <input type="text" id="email" class="form-control" onchange="validateEmail()">
            <small class="text-danger" id="emailError"></small>
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" id="phone" class="form-control" onchange="validatePhone()">
            <small class="text-danger" id="phoneError"></small>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" onchange="validatePassword()">
            <small class="text-danger" id="passwordError"></small>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" onchange="validateConfirmPassword()">
            <small class="text-danger" id="confirmPasswordError"></small>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
